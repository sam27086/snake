name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Generate snake animation
        uses: Platane/snk@v3
        with:
          github_user_name: sam27086
          outputs: snake.svg

      - name: Push snake.svg
        uses: EndBug/add-and-commit@v9
        with:
          add: "snake.svg"
          message: "update snake"
